<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEO CAFE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Khmer&family=Moul&family=Hanuman&display=swap" rel="stylesheet">
    <style>
        /* ធ្វើឱ្យការ Scroll រអិលខ្លាំង មិនទាក់ */
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Khmer OS Battambang', 'Hanuman', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            overflow-x: hidden;
            /* ជំនួយដល់ការអូសលើទូរសព្ទឱ្យ Smooth[cite: 1] */
            -webkit-overflow-scrolling: touch;
        }

        /* ១. ការសារ៉េអក្សរស្វាគមន៍ (រក្សាដូចដើម) */
        #welcome-text-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            text-align: center;
            width: 90%; 
            pointer-events: none;
            display: none; 
        }

        .show-welcome {
            display: block !important;
            animation: fadeInOut 5s forwards, globalFloat 3s ease-in-out infinite;
        }

        @keyframes globalFloat {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -53%); }
        }

        .w-1, .w-2, .w-3 {
            font-family: 'Moul', serif; 
            color: #ADFF2F; 
            margin: 0;
            text-shadow: 0 0 15px rgba(173, 255, 47, 0.6), 2px 2px 5px rgba(0,0,0,0.8);
            line-height: 1.2; 
            word-wrap: break-word; 
        }

        .w-1 { font-size: 8vw; max-size: 35px; } 
        .w-2 { font-size: 6vw; max-size: 25px; margin: 5px 0; }
        .w-3 { font-size: 12vw; max-size: 55px; letter-spacing: 1px; }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ២. Header និងកែវកាហ្វេ (រក្សាដូចដើម) */
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px; 
        }

        .coffee-container {
            position: relative;
            font-size: 35px; 
            color: #6F4E37; 
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8)); 
        }

        .steam-wrap {
            position: absolute;
            top: -20px;
            left: 8px;
            display: flex;
            gap: 4px;
        }

        .steam-wrap span {
            display: block;
            width: 2px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            filter: blur(2px);
            opacity: 0;
            animation: steamUp 2s infinite ease-out;
        }

        @keyframes steamUp {
            0% { transform: translateY(0) scaleX(1); opacity: 0; }
            40% { opacity: 0.6; transform: translateY(-10px) scaleX(2); }
            100% { transform: translateY(-30px) scaleX(3); opacity: 0; }
        }

        .store-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #6F4E37; 
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .store-name {
            margin-top: 10px;
            font-family: 'Moul', serif;
            font-size: 24px;
            color: #6F4E37;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* ៣. បញ្ជីទំនិញ (សម្រួលឱ្យ Smooth ពេលប៉ះ និងពេលដកដៃចេញ)[cite: 1] */
        .container {
            padding: 20px 10px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            /* កំណត់ឱ្យវា "ធ្លាក់ចុះមកវិញ" យ៉ាងរលូនពេលដកដៃចេញ[cite: 1] */
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), 
                        box-shadow 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            will-change: transform;
        }

        /* Effect ពេលប៉ះឱ្យអណ្ដែត[cite: 1] */
        .item-card:hover, .item-card:active {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .image-container img { width: 100%; height: 150px; object-fit: cover; }
        .details { padding: 10px; text-align: center; color: white; }
        .price { color: #ffeb3b; font-size: 18px; font-weight: bold; }

        .flower {
            position: fixed;
            top: -10%;
            z-index: 999;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>

    <script>
        window.onload = function() {
            const hasSeenWelcome = sessionStorage.getItem('hasSeenWelcome');
            const welcomeOverlay = document.getElementById('welcome-text-overlay');

            if (!hasSeenWelcome) {
                welcomeOverlay.classList.add('show-welcome');
                sessionStorage.setItem('hasSeenWelcome', 'true');
                
                setTimeout(() => {
                    welcomeOverlay.style.display = 'none';
                }, 5000);
            }
        };

        function createFlower() {
            const flowers = ['🌸', '🌺', '🍃'];
            const flower = document.createElement('div');
            flower.classList.add('flower');
            flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.animationDuration = Math.random() * 3 + 4 + 's';
            flower.style.fontSize = Math.random() * 10 + 15 + 'px';
            document.body.appendChild(flower);
            setTimeout(() => { flower.remove(); }, 7000);
        }
        setInterval(createFlower, 450);
    </script>
